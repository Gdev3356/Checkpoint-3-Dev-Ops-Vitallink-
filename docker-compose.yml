services:
 
  # Banco Oracle XE 21c
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db
    environment:
      ORACLE_PASSWORD: "OracleSecrets345"     # senha do SYSTEM / SYS
      APP_USER: "FiapAdmin123"                  # usuário criado automaticamente
      APP_USER_PASSWORD: "FiapSecret543"   # senha do APP_USER
    volumes:
      - oracle_data:/opt/oracle/oradata           # persistência de dados
      - ./sql:/container-entrypoint-initdb.d       # scripts SQL de inicialização
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - vitallink_net
    restart: unless-stopped
 
  # Aplicação Spring Boot
  vitallink-app:
    build: .
    image: vitallink:local
    container_name: vitallink-app
    depends_on:
      oracle-db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:oracle:thin:@oracle-db:1521/XEPDB1"
      SPRING_DATASOURCE_USERNAME: "FiapAdmin123"
      SPRING_DATASOURCE_PASSWORD: "FiapSecret543"
    networks:
      - vitallink_net
    restart: on-failure
 
# Rede interna
networks:
  vitallink_net:
    driver: bridge
 
# Volume nomeado (dados persistem entre restarts)
volumes:
  oracle_data: