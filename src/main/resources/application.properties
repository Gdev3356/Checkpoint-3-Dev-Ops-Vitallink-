spring.application.name=vitallink

# Oracle DataSource
# Variaveis de ambiente sobrescrevem os valores padrao (usados em localhost)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:FiapAdmin123}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:FiapSecret543}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# Servidor
server.port=8080

# Swagger / OpenAPI
# Acesse: http://localhost:8080/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

# Cache (in-memory simples; suficiente para especialidades)
spring.cache.type=simple

# Logging
logging.level.br.com.vitallink=INFO
logging.level.org.springframework.cache=DEBUG
logging.level.org.hibernate.SQL=DEBUG
